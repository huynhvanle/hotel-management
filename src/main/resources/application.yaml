server:
  port: 8080
  servlet:
    context-path: /hotel-management

spring:
  application:
    name: hotel-management
  datasource:
    url: "jdbc:mysql://localhost:3306/hotel_management_db"
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: "hotelManagementSecretKey2026VeryLongSecretKeyForHS256AlgorithmAtLeast256Bits"
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
