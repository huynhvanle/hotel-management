<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi tiết phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel</a>
        <div class="ms-auto d-flex gap-2 align-items-center">
          <a class="btn btn-outline-light btn-sm" href="./room-types.html">Hạng phòng</a>
          <a class="btn btn-outline-light btn-sm" href="./rooms.html">Danh sách phòng</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div id="roomAlert" class="alert alert-danger d-none"></div>

      <!-- Step 1: pick rooms -->
      <section id="bookingStep1" class="d-none">
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
          <div>
            <h1 class="h3 mb-1 fw-semibold">Chọn phòng</h1>
            <div class="text-muted">Tự đặt phòng: bạn đang trên trang web của khách sạn.</div>
          </div>
          <a class="btn btn-outline-secondary" href="./rooms.html">Xem danh sách phòng</a>
        </div>

        <div class="row g-3">
          <div class="col-lg-8">
            <div id="pickRoomsAlert" class="alert alert-warning d-none"></div>
            <div id="pickRoomsList" class="row g-3"></div>
          </div>
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <div class="fw-semibold">Chọn phòng</div>
                  <div class="text-muted small" id="selectedCount">0</div>
                </div>
                <div class="border rounded-3 p-3 mb-3 bg-light">
                  <div class="d-flex justify-content-between">
                    <div class="text-muted">Tổng</div>
                    <div class="fw-semibold" id="selectedTotal">0 ₫</div>
                  </div>
                </div>
                <div class="d-grid gap-2">
                  <button id="btnNextToInfo" class="btn btn-primary" type="button" disabled>Kế tiếp</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Step 2: fill customer info + submit -->
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="room-hero"></div>
            <div class="card-body">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                <div>
                  <h1 id="roomName" class="h3 fw-semibold mb-1">...</h1>
                  <div id="roomMeta" class="text-muted">...</div>
                </div>
                <div class="text-end">
                  <div class="text-muted small">Giá</div>
                  <div id="roomPrice" class="h4 mb-0 fw-semibold">...</div>
                </div>
              </div>
              <hr />
              <p id="roomDesc" class="mb-0 text-muted">...</p>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h2 class="h5 fw-semibold mb-0">Thông tin đặt phòng</h2>
                <button id="btnBackToPick" class="btn btn-outline-secondary btn-sm d-none" type="button">Quay lại</button>
              </div>

              <form id="bookingForm" class="row g-3">
                <input type="hidden" name="roomIds" />
                <div class="col-6">
                  <label class="form-label">Nhận phòng</label>
                  <input class="form-control" type="date" name="checkin" required />
                </div>
                <div class="col-6">
                  <label class="form-label">Trả phòng</label>
                  <input class="form-control" type="date" name="checkout" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Họ tên</label>
                  <input class="form-control" name="fullName" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input class="form-control" type="email" name="email" required />
                </div>
                <div class="col-6">
                  <label class="form-label">CCCD/CMND</label>
                  <input class="form-control" type="number" name="idCardNumber" min="1" required />
                </div>
                <div class="col-6">
                  <label class="form-label">SĐT</label>
                  <input class="form-control" name="phone" />
                </div>
                <div class="col-12">
                  <label class="form-label">Địa chỉ</label>
                  <input class="form-control" name="address" />
                </div>
                <div class="col-12">
                  <label class="form-label">Ghi chú</label>
                  <textarea class="form-control" name="note" rows="2"></textarea>
                </div>
                <div class="col-12 d-grid">
                  <button class="btn btn-primary" type="submit">Xác nhận đặt phòng</button>
                </div>
              </form>

              <div id="bookingResult" class="alert d-none mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/app.js?v=20260413b"></script>
  </body>
</html>
