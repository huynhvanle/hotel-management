<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lễ tân · Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="../index.html">Hotel</a>
      </div>
    </nav>

    <main class="container py-5" style="max-width: 560px;">
      <h1 class="h3 fw-semibold mb-2">Đăng nhập lễ tân</h1>
      <div class="text-muted mb-4">Dùng tài khoản nhân viên để truy cập hệ thống lễ tân.</div>

      <div id="loginAlert" class="alert alert-danger d-none"></div>

      <form id="staffLoginForm" class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input class="form-control" type="text" name="username" required autocomplete="username" />
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input class="form-control" type="password" name="password" required autocomplete="current-password" />
          </div>
          <div class="d-grid">
            <button class="btn btn-primary" type="submit">Đăng nhập</button>
          </div>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./reception-app.js?v=20260507_reception_role_gate"></script>
  </body>
</html>
