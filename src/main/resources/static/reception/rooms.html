<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lễ tân · Quản lí phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Lễ tân</a>
        <div class="ms-auto">
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h1 class="h3 fw-semibold mb-0">Quản lí phòng</h1>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="roomSearchForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Số phòng</label>
              <input class="form-control" name="roomNumber" inputmode="numeric" placeholder="Ví dụ: 301, 102" />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">Tầng</label>
              <input class="form-control" name="floor" inputmode="numeric" placeholder="Ví dụ: 3" />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Loại phòng</label>
              <input class="form-control" name="type" placeholder="Ví dụ: Standard/Deluxe/Suite" />
            </div>
            <div class="col-12 col-md-3 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div id="roomAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Số phòng</th>
                  <th>Tầng</th>
                  <th>Loại</th>
                  <th>Trạng thái</th>
                  <th class="text-end">Giá/đêm</th>
                </tr>
              </thead>
              <tbody id="roomTbody">
                <tr><td colspan="5" class="text-muted">Đang tải danh sách phòng của chi nhánh...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="roomStatusModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Cập nhật trạng thái phòng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="roomStatusAlert" class="alert alert-danger d-none"></div>
            <div class="small mb-3">
              <div><span class="text-muted">Phòng:</span> <b id="roomStatusRoomNo">—</b></div>
              <div><span class="text-muted">Loại:</span> <b id="roomStatusType">—</b></div>
              <div><span class="text-muted">Trạng thái hiện tại:</span> <b id="roomStatusCurrent">—</b></div>
            </div>
            <div>
              <label class="form-label">Trạng thái mới</label>
              <select class="form-select" id="roomStatusSelect">
                <option value="AVAILABLE">Có sẵn</option>
                <option value="UNAVAILABLE">Không có sẵn</option>
                <option value="MAINTENANCE">Bảo trì</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnSaveRoomStatus">Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./reception-app.js?v=20260507_reception_role_gate"></script>
  </body>
</html>
