<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lễ tân · Tìm kiếm đơn đặt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Lễ tân</a>
        <div class="ms-auto">
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h1 class="h3 fw-semibold mb-0">Tìm kiếm đơn đặt</h1>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="searchForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Mã đơn đặt (Booking ID)</label>
              <input class="form-control" type="number" name="bookingId" min="1" placeholder="Ví dụ: 123" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Số điện thoại khách</label>
              <input class="form-control" type="text" name="phone" placeholder="Ví dụ: 0123456789" />
            </div>
            <div class="col-12 col-md-4 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div id="searchAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Mã</th>
                  <th>SĐT</th>
                  <th>Ngày đến</th>
                  <th>Ngày đi</th>
                  <th>Đã check-in</th>
                  <th>Đã check-out</th>
                  <th>Trạng thái</th>
                  <th class="text-end">Cọc</th>
                </tr>
              </thead>
              <tbody id="resultTbody">
                <tr><td colspan="8" class="text-muted">Nhập điều kiện rồi bấm Tìm kiếm.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="detailTitle">Chi tiết đơn đặt</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="detailAlert" class="alert alert-danger d-none"></div>
            <div id="detailBox" class="small">—</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnConfirmBooking">Xác nhận đơn</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnUnconfirmBooking">Huỷ xác nhận</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnShowInvoice">Xuất hoá đơn</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnCheckout">Check-out</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnCancelBooking">Huỷ đơn</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="invoiceTitle">Hoá đơn</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="invoiceAlert" class="alert alert-danger d-none"></div>
            <div id="invoiceBox" class="small">—</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold d-none" id="btnInvoicePaid">Đã thanh toán</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./reception-app.js?v=20260507_reception_role_gate"></script>
  </body>
</html>
