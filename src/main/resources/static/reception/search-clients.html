<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lễ tân · Tra cứu khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Lễ tân</a>
        <div class="ms-auto">
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h1 class="h3 fw-semibold mb-0">Tra cứu khách hàng</h1>
        <button class="btn btn-primary" type="button" id="btnAddClient">Thêm khách hàng</button>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="searchClientForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">CCCD/Passport</label>
              <input class="form-control" type="text" name="idCardNumber" placeholder="Nhập CCCD/Passport" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Số điện thoại</label>
              <input class="form-control" type="text" name="phone" placeholder="Nhập số điện thoại" />
            </div>
            <div class="col-12 col-md-4 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div id="clientAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Họ tên</th>
                  <th>SĐT</th>
                  <th>CCCD/Passport</th>
                </tr>
              </thead>
              <tbody id="clientTbody">
                <tr><td colspan="4" class="text-muted">Nhập điều kiện rồi bấm Tìm kiếm.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="clientDetailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="clientDetailTitle">Chi tiết khách hàng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="clientDetailAlert" class="alert alert-danger d-none"></div>
            <div id="clientDetailBox" class="small">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addClientModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Thêm khách hàng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="addClientAlert" class="alert alert-danger d-none"></div>
            <form id="addClientForm" class="row g-3">
              <div class="col-12">
                <label class="form-label">Họ tên</label>
                <input class="form-control" name="fullName" required />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Số điện thoại (10 chữ số)</label>
                <input
                  class="form-control"
                  name="phone"
                  required
                  maxlength="10"
                  pattern="\d{10}"
                  inputmode="numeric"
                  title="Nhập đúng 10 chữ số"
                />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">CCCD/Passport (số)</label>
                <input class="form-control" name="idCardNumber" required inputmode="numeric" />
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-primary" type="submit" id="btnCreateClient">Thêm</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./reception-app.js?v=20260507_reception_role_gate"></script>
  </body>
</html>
