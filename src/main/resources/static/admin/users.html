<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260414_cssfix" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="./users.html">Users</a></li>
            <li class="nav-item"><a class="nav-link" href="./hotels.html">Hotels</a></li>
            <li class="nav-item"><a class="nav-link" href="./rooms.html">Rooms</a></li>
            <li class="nav-item"><a class="nav-link" href="./bookings.html">Bookings</a></li>
            <li class="nav-item ms-lg-2"><button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Users</h1>
          <div class="text-muted">Danh sách và cập nhật user.</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary" id="btnAddUser">Add user</button>
          <button class="btn btn-primary" id="btnReload">Reload</button>
        </div>
      </div>

      <div id="usersAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Full name</th>
                <th>Position</th>
                <th>Mail</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="usersTbody"></tbody>
          </table>
        </div>
      </div>

      <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Update user</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="editAlert" class="alert alert-danger d-none"></div>
              <form id="editForm" class="row g-3">
                <input type="hidden" name="id" />
                <div class="col-12">
                  <label class="form-label">Username</label>
                  <input class="form-control" name="username" />
                </div>
                <div class="col-12">
                  <label class="form-label">Full name</label>
                  <input class="form-control" name="fullName" />
                </div>
                <div class="col-12">
                  <label class="form-label">Role</label>
                  <select class="form-select" name="position" required>
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Mail</label>
                  <input class="form-control" name="mail" />
                </div>
                <div class="col-12">
                  <label class="form-label">Description</label>
                  <input class="form-control" name="description" />
                </div>
                <div class="col-12">
                  <label class="form-label">New password (optional)</label>
                  <input class="form-control" type="password" name="password" />
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-primary" id="btnSave">Save</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Create user</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="createAlert" class="alert alert-danger d-none"></div>
              <form id="createForm" class="row g-3">
                <div class="col-12">
                  <label class="form-label">Username</label>
                  <input class="form-control" name="username" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Password</label>
                  <input class="form-control" type="password" name="password" required />
                  <div class="form-text">Tối thiểu 8 ký tự, có ít nhất 1 chữ và 1 số.</div>
                </div>
                <div class="col-12">
                  <label class="form-label">Full name</label>
                  <input class="form-control" name="fullName" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Mail</label>
                  <input class="form-control" name="mail" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Role</label>
                  <select class="form-select" name="position" required>
                    <option value="USER" selected>USER</option>
                    <option value="ADMIN">ADMIN</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Description</label>
                  <input class="form-control" name="description" />
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-primary" id="btnCreate">Create</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
