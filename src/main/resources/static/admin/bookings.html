<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260414_cssfix" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./users.html">Users</a></li>
            <li class="nav-item"><a class="nav-link" href="./hotels.html">Hotels</a></li>
            <li class="nav-item"><a class="nav-link" href="./rooms.html">Rooms</a></li>
            <li class="nav-item"><a class="nav-link active" href="./bookings.html">Bookings</a></li>
            <li class="nav-item ms-lg-2"><button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Bookings</h1>
          <div class="text-muted">Danh sách booking + chi tiết + check-in phòng.</div>
        </div>
        <button class="btn btn-primary" id="btnReloadBookings">Reload</button>
      </div>

      <div id="bookingsAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Booking date</th>
                <th>Client</th>
                <th class="text-end">Rooms</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bookingsTbody"></tbody>
          </table>
        </div>
      </div>

      <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="bookingTitle">Booking</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="bookingModalAlert" class="alert alert-danger d-none"></div>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <div class="text-muted small">Client</div>
                  <div class="fw-semibold" id="bkClient">—</div>
                  <div class="small text-muted" id="bkClientMeta">—</div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted small">Booking</div>
                  <div class="fw-semibold" id="bkEmployee">—</div>
                  <div class="small text-muted" id="bkDate">—</div>
                </div>
                <div class="col-12">
                  <div class="text-muted small">Note</div>
                  <div id="bkNote" class="text-muted">—</div>
                </div>
              </div>
              <hr />
              <div class="fw-semibold mb-2">Booked rooms</div>
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Room</th>
                      <th>Checkin</th>
                      <th>Checkout</th>
                      <th>Checked in</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="bookedRoomsTbody"></tbody>
                </table>
              </div>

              <hr />
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <div class="fw-semibold">Bill</div>
                <div class="small text-muted" id="billMeta">—</div>
              </div>
              <div id="billAlert" class="alert alert-danger d-none"></div>

              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                  <label class="form-label">Payment date</label>
                  <input class="form-control" type="date" id="billPaymentDate" />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Payment type</label>
                  <select class="form-select" id="billPaymentType">
                    <option value="0">Cash</option>
                    <option value="1">Card</option>
                    <option value="2">Transfer</option>
                  </select>
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">Payment amount</label>
                  <input class="form-control" type="number" min="0" step="1000" id="billAmount" disabled />
                  <div class="form-text">Tự động tính từ booking.</div>
                </div>
                <div class="col-12">
                  <label class="form-label">Note</label>
                  <input class="form-control" type="text" id="billNote" maxlength="500" />
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end">
                  <button class="btn btn-outline-danger d-none" id="btnDeleteBill" type="button">Delete bill</button>
                  <button class="btn btn-primary" id="btnSaveBill" type="button">Save bill</button>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin.js"></script>
    <script src="./bookings.js?v=20260414_bill_in_booking"></script>
  </body>
</html>
