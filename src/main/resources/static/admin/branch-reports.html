<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Báo cáo & Thống kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hệ thống quản trị</a>
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" id="btnBack" type="button">Trang chủ</button>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Báo cáo & Thống kê</h1>
          <div class="text-muted small" id="branchHint">—</div>
        </div>
      </div>

      <div id="pageAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="reportForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-3">
              <label class="form-label">Từ ngày</label>
              <input class="form-control" type="date" name="from" required />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Đến ngày</label>
              <input class="form-control" type="date" name="to" required />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Nhóm theo</label>
              <select class="form-select" name="groupBy">
                <option value="DAY">Ngày</option>
                <option value="MONTH">Tháng</option>
                <option value="YEAR">Năm</option>
              </select>
            </div>
            <div class="col-12 col-md-3 d-grid">
              <button class="btn btn-primary fw-semibold" type="submit">Xem báo cáo</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <div class="fw-semibold mb-2">Doanh thu</div>
          <div id="emptyBox" class="alert alert-warning d-none mb-0">Không có dữ liệu</div>
          <div class="row g-3" id="reportBox">
            <div class="col-12 col-lg-7">
              <canvas id="revChart" height="160"></canvas>
            </div>
            <div class="col-12 col-lg-5">
              <div class="border rounded-3 p-3 bg-light">
                <div class="small text-muted">Tổng doanh thu</div>
                <div class="h4 fw-semibold hm-text-gold mb-0" id="totalRevenue">—</div>
                <div class="small text-muted mt-2" id="rangeText">—</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th class="text-end">Số hoá đơn</th>
                  <th class="text-end">Doanh thu</th>
                </tr>
              </thead>
              <tbody id="revTbody">
                <tr><td colspan="3" class="text-muted">Chọn bộ lọc và bấm “Xem báo cáo”.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./receptionist-app.js?v=20260507_admin_dashboard"></script>
  </body>
</html>
