<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Revenue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260416_revenue" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./users.html">Users</a></li>
            <li class="nav-item"><a class="nav-link" href="./hotels.html">Hotels</a></li>
            <li class="nav-item"><a class="nav-link" href="./rooms.html">Rooms</a></li>
            <li class="nav-item"><a class="nav-link" href="./bookings.html">Bookings</a></li>
            <li class="nav-item"><a class="nav-link active" href="./revenue.html">Revenue</a></li>
            <li class="nav-item ms-lg-2"><button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Revenue statistics</h1>
          <div class="text-muted small" id="revenueBasis"></div>
        </div>
        <a class="btn btn-outline-secondary" href="./index.html">Dashboard</a>
      </div>

      <div id="revenueAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-3">
              <label class="form-label">Từ ngày (booking)</label>
              <input class="form-control" type="date" id="revenueFrom" />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Đến ngày (booking)</label>
              <input class="form-control" type="date" id="revenueTo" />
            </div>
            <div class="col-12 col-md-3">
              <button class="btn btn-primary" type="button" id="btnRevenueLoad">Xem thống kê</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <div class="text-muted small" id="revenueMeta"></div>
          <div class="display-6 fw-semibold mt-2" id="revenueTotal">—</div>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>Booking</th>
                <th>Mã phòng</th>
                <th>Tên phòng</th>
                <th>Ngày đặt</th>
                <th>Nhận</th>
                <th>Trả</th>
                <th class="text-end">Đêm</th>
                <th class="text-end">Thành tiền</th>
              </tr>
            </thead>
            <tbody id="revenueTbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin.js"></script>
    <script src="./revenue.js?v=20260416"></script>
  </body>
</html>
