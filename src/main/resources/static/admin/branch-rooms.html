<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lí phòng (Chi nhánh)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hệ thống quản trị</a>
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" id="btnBack" type="button">Trang chủ</button>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Quản lí phòng</h1>
          <div class="text-muted small" id="branchHint">—</div>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-primary fw-semibold" id="btnAddRoom" type="button">Thêm phòng mới</button>
          <button class="btn btn-primary fw-semibold" id="btnEditRoom" type="button" disabled>Sửa</button>
          <button class="btn btn-primary fw-semibold" id="btnDeleteRoom" type="button" disabled>Xóa</button>
        </div>
      </div>

      <div id="pageAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="searchForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Số phòng</label>
              <input class="form-control" name="roomNumber" inputmode="numeric" placeholder="Ví dụ: 301, 102" />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">Tầng</label>
              <input class="form-control" name="floor" inputmode="numeric" placeholder="Ví dụ: 3" />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Loại phòng</label>
              <input class="form-control" name="type" placeholder="Ví dụ: Standard/Deluxe/Suite" />
            </div>
            <div class="col-12 col-md-3 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Số phòng</th>
                  <th>Tầng</th>
                  <th>Loại phòng</th>
                  <th>Trạng thái</th>
                  <th class="text-end">Giá</th>
                </tr>
              </thead>
              <tbody id="roomTbody">
                <tr><td colspan="5" class="text-muted">Đang tải danh sách phòng của chi nhánh...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="small text-muted mt-2">Chỉ cho phép sửa/xóa khi phòng ở trạng thái <b>Bảo trì</b>.</div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="roomModalTitle">Phòng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="roomModalAlert" class="alert alert-danger d-none"></div>
            <form id="roomForm">
              <div class="mb-3">
                <label class="form-label">Số phòng</label>
                <input class="form-control" name="id" inputmode="numeric" pattern="\\d+" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Tầng</label>
                <input class="form-control" type="number" name="floor" min="0" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Loại phòng</label>
                <select class="form-select" name="roomTypeId" required>
                  <option value="">— Chọn loại phòng —</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnSaveRoom">Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Xóa phòng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="deleteAlert" class="alert alert-danger d-none"></div>
            <div id="deleteStep1">
              <div class="mb-2">Bạn chắc chắn muốn xóa phòng <b id="deleteRoomId1">—</b>?</div>
              <div class="small text-muted">Chỉ được xóa khi phòng đang ở trạng thái <b>Bảo trì</b>.</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnDeleteConfirm">Xóa</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./receptionist-app.js?v=20260507_branch_reports"></script>
  </body>
</html>
