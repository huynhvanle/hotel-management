<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý loại phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hệ thống quản trị</a>
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" id="btnBack" type="button">Trang chủ</button>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h1 class="h3 fw-semibold mb-0">Quản lý loại phòng</h1>
        <button class="btn btn-primary fw-semibold" id="btnAddRt" type="button">Thêm loại phòng mới</button>
      </div>

      <div id="pageAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Mã</th>
                  <th>Tên</th>
                  <th>Mô tả</th>
                  <th class="text-end">Giá</th>
                  <th>Trạng thái</th>
                  <th class="text-end">Thao tác</th>
                </tr>
              </thead>
              <tbody id="rtTbody">
                <tr><td colspan="7" class="text-muted">Đang tải danh sách loại phòng...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="rtModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="rtModalTitle">Loại phòng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="rtModalAlert" class="alert alert-danger d-none"></div>
            <form id="rtForm" class="row g-3">
              <div class="col-12 col-md-3">
                <label class="form-label">Mã</label>
                <input class="form-control" name="code" required />
              </div>
              <div class="col-12 col-md-5">
                <label class="form-label">Tên</label>
                <input class="form-control" name="name" required />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label">Giá</label>
                <input class="form-control" name="basePrice" inputmode="decimal" required />
              </div>
              <div class="col-12">
                <label class="form-label">Mô tả</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label">Trạng thái</label>
                <select class="form-select" name="status">
                  <option value="ACTIVE">Hoạt động</option>
                  <option value="INACTIVE">Ngừng</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnSaveRt">Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="rtDeleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Xóa loại phòng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="rtDeleteAlert" class="alert alert-danger d-none"></div>
            <div>Bạn chắc chắn muốn xóa loại phòng <b id="rtDeleteName">—</b>?</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnConfirmDeleteRt">Xóa</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./receptionist-app.js?v=20260507_admin_roomtypes_ui"></script>
  </body>
</html>
