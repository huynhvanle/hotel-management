<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lí nhân viên quản lí</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hệ thống quản trị</a>
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" id="btnBack" type="button">Trang chủ</button>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h1 class="h3 fw-semibold mb-0">Quản lí nhân viên quản lí</h1>
        <button class="btn btn-primary fw-semibold" id="btnAddMgr" type="button">Thêm mới</button>
      </div>

      <div id="pageAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="mgrSearchForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-2">
              <label class="form-label">ID</label>
              <input class="form-control" type="number" name="id" min="1" />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">SĐT</label>
              <input class="form-control" name="phone" inputmode="numeric" />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">Họ tên</label>
              <input class="form-control" name="fullName" />
            </div>
            <div class="col-12 col-md-2 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Họ tên</th>
                  <th>SĐT</th>
                  <th>Chi nhánh</th>
                </tr>
              </thead>
              <tbody id="mgrTbody">
                <tr><td colspan="5" class="text-muted">Đang tải danh sách Manager...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="small text-muted mt-2">Mỗi chi nhánh chỉ được có 1 Manager tại một thời điểm.</div>
          <div class="d-flex gap-2 justify-content-end mt-3">
            <button class="btn btn-primary fw-semibold" id="btnEditMgr" type="button" disabled>Sửa</button>
            <button class="btn btn-primary fw-semibold" id="btnDeleteMgr" type="button" disabled>Xóa</button>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="mgrModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="mgrModalTitle">Manager</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="mgrModalAlert" class="alert alert-danger d-none"></div>
            <form id="mgrForm" class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" required autocomplete="off" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Mật khẩu</label>
                <input class="form-control" type="password" name="password" minlength="8" autocomplete="new-password" />
                <div class="small text-muted mt-1" id="mgrPassHint">Mật khẩu tối thiểu 8 ký tự.</div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Họ tên</label>
                <input class="form-control" name="fullName" required />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">SĐT (10 số)</label>
                <input class="form-control" name="phone" inputmode="numeric" pattern="\\d{10}" required />
              </div>
              <div class="col-12">
                <label class="form-label">Chi nhánh trực thuộc</label>
                <select class="form-select" name="branchId" required>
                  <option value="">— Chọn chi nhánh —</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnSaveMgr">Lưu</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="mgrDeleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Thu hồi quyền quản trị</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div id="mgrDeleteAlert" class="alert alert-danger d-none"></div>
            <div>Bạn chắc chắn muốn thu hồi quyền quản trị vĩnh viễn của tài khoản <b id="mgrDeleteName">—</b>?</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary fw-semibold" id="btnConfirmDeleteMgr">Xóa</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./receptionist-app.js?v=20260507_admin_roomtypes_ui"></script>
  </body>
</html>
