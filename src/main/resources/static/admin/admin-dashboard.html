<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard tổng thể</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260507_navbar_btns" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hệ thống quản trị</a>
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" id="btnBack" type="button">Trang chủ</button>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Dashboard tổng thể</h1>
          <div class="text-muted small">Báo cáo dựa trên hoá đơn đã tất toán.</div>
        </div>
      </div>

      <div id="pageAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="dashForm" class="row g-3 align-items-end">
            <div class="col-12 col-md-3">
              <label class="form-label">Từ ngày</label>
              <input class="form-control" type="date" name="from" required />
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Đến ngày</label>
              <input class="form-control" type="date" name="to" required />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">Nhóm theo</label>
              <select class="form-select" name="groupBy">
                <option value="DAY">Ngày</option>
                <option value="MONTH" selected>Tháng</option>
                <option value="YEAR">Năm</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">So sánh chi nhánh</label>
              <select class="form-select" id="compareSelect" multiple size="3"></select>
              <div class="small text-muted mt-1">Giữ Cmd để chọn nhiều.</div>
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary fw-semibold" type="submit">Cập nhật dữ liệu</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
            <div class="fw-semibold">Tổng doanh thu chuỗi</div>
            <div class="h5 fw-semibold hm-text-gold mb-0" id="totalRevenue">—</div>
          </div>
          <canvas id="growthChart" height="140"></canvas>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="fw-semibold mb-2">Xếp hạng hiệu quả chi nhánh</div>
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Chi nhánh</th>
                  <th class="text-end">Số hoá đơn</th>
                  <th class="text-end">Doanh thu</th>
                </tr>
              </thead>
              <tbody id="rankTbody">
                <tr><td colspan="3" class="text-muted">Đang tải...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="small text-muted mt-2">Bấm vào tên chi nhánh để xem báo cáo chi tiết.</div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./receptionist-app.js?v=20260507_admin_dashboard"></script>
  </body>
</html>
