<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css?v=20260414_cssfix" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./users.html">Users</a></li>
            <li class="nav-item"><a class="nav-link" href="./hotels.html">Hotels</a></li>
            <li class="nav-item"><a class="nav-link active" href="./rooms.html">Rooms</a></li>
            <li class="nav-item"><a class="nav-link" href="./bookings.html">Bookings</a></li>
            <li class="nav-item ms-lg-2"><button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 fw-semibold mb-1">Rooms</h1>
          <div class="text-muted">Danh sách và cập nhật phòng (ADMIN/USER).</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary" id="btnAddRoom">Add room</button>
          <button class="btn btn-primary" id="btnReloadRooms">Reload</button>
        </div>
      </div>

      <div id="roomsAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th class="text-end">Price</th>
                <th>Hotel</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="roomsTbody"></tbody>
          </table>
        </div>
      </div>

      <div class="modal fade" id="roomModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="roomModalTitle">Room</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="roomAlert" class="alert alert-danger d-none"></div>
              <form id="roomForm" class="row g-3">
                <div class="col-12">
                  <label class="form-label">Image</label>
                  <div class="d-flex gap-3 align-items-start">
                    <img id="roomImgPreview" alt="Room image" style="width: 120px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #e5e7eb;" />
                    <div class="flex-grow-1">
                      <input class="form-control" type="file" id="roomImgFile" accept="image/*" />
                      <div class="form-text">Upload JPG/PNG/WEBP. Sẽ thay thế ảnh cũ.</div>
                      <button class="btn btn-outline-primary btn-sm mt-2" type="button" id="btnUploadRoomImg">Upload / Replace</button>
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label">Room ID</label>
                  <input class="form-control" name="id" placeholder="R-101" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Name</label>
                  <input class="form-control" name="name" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Type</label>
                  <input class="form-control" name="type" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Price</label>
                  <input class="form-control" name="price" type="number" min="0" step="1000" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Hotel</label>
                  <select class="form-select" name="hotelId" required></select>
                </div>
                <div class="col-12">
                  <label class="form-label">Description</label>
                  <input class="form-control" name="description" />
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-primary" id="btnSaveRoom">Save</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin.js"></script>
    <script src="./rooms.js?v=20260414c"></script>
  </body>
</html>
