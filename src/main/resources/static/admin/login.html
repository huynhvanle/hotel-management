<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <span class="navbar-text text-white-50">Admin</span>
      </div>
    </nav>

    <main class="container py-5" style="max-width: 520px;">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 fw-semibold mb-1">Đăng nhập</h1>
          <div class="text-muted mb-4">Dành cho nhân viên / quản trị viên.</div>

          <div id="loginAlert" class="alert alert-danger d-none"></div>

          <form id="loginForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" autocomplete="username" required />
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" autocomplete="current-password" required />
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary" type="submit">Đăng nhập</button>
            </div>
          </form>

          <div class="small text-muted mt-3">
            Gợi ý: tài khoản admin là user có <code>position=ADMIN</code>.
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
