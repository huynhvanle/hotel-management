<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./rooms.html">Rooms</a></li>
            <li class="nav-item"><a class="nav-link" href="./bookings.html">Bookings</a></li>
            <li class="nav-item"><a class="nav-link active" href="./profile.html">My profile</a></li>
            <li class="nav-item ms-lg-2"><button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 720px;">
      <h1 class="h4 fw-semibold mb-3">Hồ sơ của tôi</h1>
      <div id="meAlert" class="alert alert-danger d-none"></div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Username</label>
              <input class="form-control" id="meUsername" disabled />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Role (position)</label>
              <input class="form-control" id="mePosition" disabled />
            </div>
          </div>

          <hr />

          <form id="meForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Full name</label>
              <input class="form-control" name="fullName" />
            </div>
            <div class="col-12">
              <label class="form-label">Mail</label>
              <input class="form-control" name="mail" />
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <input class="form-control" name="description" />
            </div>
            <div class="col-12">
              <label class="form-label">New password (optional)</label>
              <input class="form-control" type="password" name="password" />
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary" type="submit">Lưu thay đổi</button>
            </div>
          </form>

          <div id="meSaved" class="alert alert-success d-none mt-3 mb-0">Đã lưu.</div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./staff-app.js"></script>
    <script src="./staff-profile.js"></script>
  </body>
</html>
