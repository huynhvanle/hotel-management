<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hạng phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css?v=20260414_cssfix" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Hotel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="./index.html">Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link" href="./room-types.html">Hạng phòng</a></li>
            <li class="nav-item"><a class="nav-link active" href="./room-list.html">Danh sách phòng</a></li>
            <li class="nav-item ms-lg-2"><a class="btn btn-primary btn-sm" href="./room.html">Đặt phòng</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <div>
          <h1 class="h3 mb-1 fw-semibold">Hạng phòng</h1>
          <div class="text-muted">Chọn phòng phù hợp và tiến hành đặt phòng.</div>
        </div>
        <a class="btn btn-outline-secondary" href="./index.html">Quay lại</a>
      </div>

      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <form id="filterForm" class="row g-3">
            <div class="col-12 col-md-3">
              <label class="form-label">Khách sạn</label>
              <select class="form-select" name="hotelId" id="hotelSelect">
                <option value="">Tất cả</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Loại phòng</label>
              <select class="form-select" name="type">
                <option value="">Tất cả</option>
                <option value="Standard">Standard</option>
                <option value="Deluxe">Deluxe</option>
                <option value="Suite">Suite</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">Giá tối thiểu</label>
              <input class="form-control" type="number" name="minPrice" min="0" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">Giá tối đa</label>
              <input class="form-control" type="number" name="maxPrice" min="0" />
            </div>
            <div class="col-12 col-md-2 d-grid">
              <button class="btn btn-primary" type="submit">Tìm kiếm</button>
            </div>
          </form>
        </div>
      </div>

      <div id="roomsAlert" class="alert alert-warning d-none"></div>
      <div id="roomsGrid" class="row g-3"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/app.js?v=20260415_roomlist_select"></script>
  </body>
</html>
